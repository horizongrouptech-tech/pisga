<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>מועדון הפסגה - המסע לפסגה</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141b2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="מועדון הפסגה">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef2f8; --card:#ffffff; --ink:#182036; --ink2:#3a4358; --muted:#71809c; --line:#e4e9f2;
    --dark:#141b2e; --orange:#f6894f; --orange2:#fc9f67; --teal:#2299b3; --teal-l:#5ac6dc;
    --good:#25b877; --gold:#d9a531; --blue:#5b83f0; --purple:#9a6ff0; --red:#e8607a;
    --shadow:0 8px 30px rgba(30,45,80,.08); --shadow2:0 4px 16px rgba(30,45,80,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Heebo',-apple-system,'Segoe UI',Arial,sans-serif;background:
     radial-gradient(900px 500px at 90% -5%,rgba(90,198,220,.18),transparent),
     radial-gradient(700px 500px at 0% 0%,rgba(252,159,103,.14),transparent),var(--bg);
     color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
  .hidden{display:none!important}.muted{color:var(--muted)}

  .ticker{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--line);overflow:hidden;height:40px;display:flex;align-items:center;box-shadow:var(--shadow2)}
  .ticker .live{flex:none;display:flex;align-items:center;gap:7px;padding:0 15px;font-weight:900;font-size:12px;color:var(--good);border-left:1px solid var(--line);height:100%}
  .ticker .live .pdot{width:8px;height:8px;border-radius:50%;background:var(--good);animation:pulse 1.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,184,119,.5)}70%{box-shadow:0 0 0 7px rgba(37,184,119,0)}100%{box-shadow:0 0 0 0 rgba(37,184,119,0)}}
  .ticker .track{display:flex;gap:34px;white-space:nowrap;animation:scroll 36s linear infinite;padding-right:34px}
  .ticker .track b{color:var(--teal)} .ticker .track span{color:var(--ink2);font-size:13.5px;font-weight:600}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  .nav{position:sticky;top:40px;z-index:30;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;padding:11px 18px;flex-wrap:wrap}
  .brand{font-weight:900;display:flex;align-items:center;gap:10px}
  .brand .logo{width:30px;height:30px}.brand small{color:var(--teal);font-weight:800;font-size:11px}
  .nav .spacer{margin-inline-start:auto}
  .nav button.tab{background:transparent;border:none;color:var(--muted);font-family:inherit;font-weight:800;font-size:14px;padding:8px 12px;border-radius:10px;cursor:pointer}
  .nav button.tab.active{background:var(--dark);color:#fff}
  .navwallet{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#fff3e8,#ffe9d6);border:1px solid #f6c9a3;border-radius:999px;padding:6px 14px;font-weight:900;color:#8a4a1e;box-shadow:var(--shadow2)}
  .navwallet .c{font-size:15px}.navwallet small{font-weight:700;font-size:10px;color:#b06b3a}
  .navtier{display:flex;align-items:center;gap:6px;border-radius:999px;padding:6px 13px;font-weight:900;font-size:13px;box-shadow:var(--shadow2);border:1px solid rgba(0,0,0,.06)}
  .navbell{position:relative;display:flex;align-items:center;justify-content:center;width:38px;height:38px;background:#fff;border:1px solid var(--line);border-radius:50%;cursor:pointer;font-size:18px;box-shadow:var(--shadow2)}
  .navbell:hover{background:#f5f8fc}
  .navbell .bdg{position:absolute;top:-4px;left:-4px;min-width:18px;height:18px;padding:0 4px;background:#e8607a;color:#fff;border-radius:999px;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
  @keyframes bellRing{0%,100%{transform:rotate(0)}20%{transform:rotate(-14deg)}40%{transform:rotate(12deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(6deg)}}
  .navbell.ring{animation:bellRing .7s ease}
  .navtier .em{font-size:15px}
  .whoami{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 6px 4px 12px;cursor:pointer;box-shadow:var(--shadow2)}
  .whoami .av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:900;color:#fff;font-size:13px}
  .whoami .nm{font-weight:800;font-size:13px}

  .wrap{max-width:1080px;margin:0 auto;padding:22px 16px 90px}
  h1{font-size:clamp(23px,4vw,32px);font-weight:900;letter-spacing:-.01em}
  .kick{color:var(--teal);font-weight:900;font-size:12px;letter-spacing:.1em;margin-bottom:6px}
  .sec{margin-top:26px}
  .zonelbl{font-size:11.5px;font-weight:900;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin:32px 2px 2px;display:flex;align-items:center;gap:10px}
  .zonelbl::after{content:"";flex:1;height:1px;background:var(--line)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 20px;box-shadow:var(--shadow2)}

  #splash{position:fixed;inset:0;z-index:6000;background:radial-gradient(circle at 50% 36%,#22304f,#0c1020);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .5s}
  #splash.hide{opacity:0;pointer-events:none}
  .splashInner{text-align:center;animation:splashIn .7s ease}
  .splashLogo{width:min(62vw,290px);height:auto;border-radius:28px;box-shadow:0 24px 70px rgba(0,0,0,.5)}
  .splashTitle{color:#fff;font-size:28px;font-weight:900;margin-top:24px}
  .splashTap{color:#9db2d4;font-size:14.5px;font-weight:700;margin-top:12px;animation:tapPulse 1.6s infinite}
  @keyframes splashIn{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}
  @keyframes tapPulse{0%,100%{opacity:.45}50%{opacity:1}}
  .login{max-width:900px;margin:26px auto;text-align:center}
  .heroArt{position:relative;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:26px}
  .heroArt svg{display:block;width:100%;height:auto}
  .heroArt .cap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 60% 55% at center,rgba(255,255,255,.62),transparent 72%)}
  .heroArt .cap h1{font-size:clamp(26px,5vw,44px);color:#12202f;text-shadow:0 1px 10px rgba(255,255,255,.85)}
  .heroArt .cap p{color:#183042;font-weight:800;margin-top:8px;font-size:clamp(14px,2.4vw,18px);text-shadow:0 1px 8px rgba(255,255,255,.85)}
  .login .subnote{color:var(--muted);font-size:13px;margin-bottom:22px}
  .users{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:13px}
  .ucard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;cursor:pointer;transition:.16s;text-align:center;box-shadow:var(--shadow2)}
  .ucard:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--teal-l)}
  .ucard .av{width:54px;height:54px;border-radius:50%;margin:0 auto 10px;display:grid;place-items:center;font-weight:900;color:#fff;font-size:21px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
  .ucard .nm{font-weight:800}.ucard .role{font-size:12px;color:var(--muted);margin-top:2px}
  .ucard .tiertag{margin-top:9px;font-size:11px;font-weight:900;display:inline-block;padding:3px 11px;border-radius:999px}

  .metal-member{background:linear-gradient(135deg,#eaf0f8,#d6e0f0);color:#33405c}
  .metal-silver{background:linear-gradient(135deg,#ffffff,#cbd4e2 48%,#eef2f8);color:#333c52}
  .metal-gold{background:linear-gradient(135deg,#fdefba,#e0b53f 52%,#f7e08f);color:#54410f}
  .metal-platinum{background:linear-gradient(135deg,#e2e9f4,#8496bd 52%,#c4d0e6);color:#20294a}
  .metal-topplat{background:linear-gradient(135deg,#f4efe0,#b0a271 50%,#e6dfc4);color:#3c3512}
  .metal-black{background:linear-gradient(135deg,#26304a,#0e1220);color:#e9c463}

  .mcard{position:relative;border-radius:20px;padding:22px 24px;overflow:hidden;box-shadow:var(--shadow);min-height:200px;display:flex;flex-direction:column;justify-content:space-between}
  .mcard::after{content:"";position:absolute;top:-60%;left:-20%;width:80%;height:220%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);transform:rotate(18deg)}
  .mcard.metal-black::after{background:linear-gradient(90deg,transparent,rgba(233,196,99,.14),transparent)}
  .mcard .top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:2}
  .mcard .prog{font-weight:900;letter-spacing:.14em;font-size:12px;opacity:.85}
  .mcard .cls{font-size:clamp(26px,4vw,38px);font-weight:900;line-height:1}
  .mcard .cls small{display:block;font-size:13px;font-weight:800;opacity:.75;margin-top:3px}
  .mcard .chip{width:44px;height:32px;border-radius:7px;background:linear-gradient(135deg,rgba(255,255,255,.7),rgba(255,255,255,.25));border:1px solid rgba(255,255,255,.5);position:relative}
  .mcard.metal-black .chip{background:linear-gradient(135deg,rgba(233,196,99,.5),rgba(233,196,99,.15));border-color:rgba(233,196,99,.4)}
  .mcard .chip::before{content:"";position:absolute;inset:8px 6px;border:1px solid rgba(0,0,0,.12);border-radius:3px}
  .mcard .bot{display:flex;justify-content:space-between;align-items:flex-end;position:relative;z-index:2}
  .mcard .mname{font-size:22px;font-weight:900;line-height:1.1}
  .mcard .since{font-size:11.5px;font-weight:700;opacity:.8;margin-top:3px}
  .mcard .bal b{font-size:26px;font-weight:900;display:block;line-height:1}.mcard .bal span{font-size:11px;font-weight:700;opacity:.8}
  .mcard .medal{position:absolute;left:20px;top:50%;transform:translateY(-50%);opacity:.15;z-index:1}.mcard .medal svg{width:120px;height:120px}

  .trail{display:flex;align-items:flex-end;position:relative;padding:10px 4px 0}
  .trail .st{flex:1;text-align:center;position:relative}
  .trail .st .dot{width:26px;height:26px;border-radius:50%;margin:0 auto;display:grid;place-items:center;font-weight:900;font-size:12px;color:#fff;border:3px solid #fff;box-shadow:var(--shadow2);position:relative;z-index:2}
  .trail .st .lbl{font-size:11px;font-weight:800;margin-top:6px;color:var(--muted)}
  .trail .st.done .lbl,.trail .st.cur .lbl{color:var(--ink)}.trail .st.cur .dot{transform:scale(1.35)}
  .trail .line{position:absolute;top:13px;right:50%;left:-50%;height:4px;z-index:1;background:var(--line)}
  .trail .st.done .line,.trail .st.cur .line{background:linear-gradient(90deg,var(--teal),var(--orange))}
  .trail .st:first-child .line{display:none}

  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:820px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}}
  .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow2)}
  .stat .lab{font-size:12px;color:var(--muted);font-weight:800;display:flex;align-items:center;gap:6px}
  .stat .big{font-size:30px;font-weight:900;margin-top:4px;line-height:1}.stat .sub{font-size:12px;color:var(--muted);margin-top:5px}
  .auto,.self{font-size:10px;font-weight:900;padding:2px 7px;border-radius:999px}
  .auto{background:rgba(91,131,240,.12);color:var(--blue)}.self{background:rgba(217,165,49,.14);color:var(--gold)}
  .bar{height:10px;background:#eef1f7;border-radius:999px;overflow:hidden;margin-top:8px;border:1px solid var(--line)}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--orange));border-radius:999px}
  .tierbadge{display:inline-flex;align-items:center;gap:6px;font-weight:900;padding:5px 12px;border-radius:999px;font-size:12.5px}
  .forfeit{margin-top:14px;background:#fff4f6;border:1px solid #f6c9d3;border-radius:12px;padding:12px 15px;font-size:13px;color:#8a3a4c}.forfeit b{color:var(--red)}
  .note{background:#eef8fb;border:1px solid #bfe4ec;border-radius:12px;padding:13px 16px;font-size:13.5px;color:#1d4a56;margin-top:14px}

  table{width:100%;border-collapse:collapse}
  .lead th,.lead td{padding:12px;text-align:right;border-bottom:1px solid var(--line);vertical-align:middle}
  .lead thead th{color:var(--ink2);font-size:12.5px;font-weight:900;background:#f3f6fb}
  .lead tbody tr:hover{background:#f7f9fc}
  .lead .rk{font-weight:900;color:var(--muted);width:38px;font-size:16px}.lead .rk.top{color:var(--gold)}
  .lead .me{background:#eef8fb!important}
  .lead .who{display:flex;align-items:center;gap:9px;font-weight:800}
  .lead .av{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-weight:900;color:#fff;font-size:12px}
  .trend{font-weight:800}.trend.up{color:var(--good)}.trend.flat{color:var(--muted)}.stars{color:var(--gold);letter-spacing:1px}
  .tabs{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap}
  .tabs button{background:#fff;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-weight:800;font-size:13px;padding:8px 15px;border-radius:999px;cursor:pointer;box-shadow:var(--shadow2)}
  .tabs button.on{background:var(--dark);color:#fff;border-color:var(--dark)}

  /* dept vs dept */
  .vs{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-top:8px}
  .vs .team{border-radius:16px;padding:16px 18px;box-shadow:var(--shadow2)}
  .vs .team.a{background:linear-gradient(135deg,#eef7fb,#e0eff6);border:1px solid #bfe0ec}
  .vs .team.b{background:linear-gradient(135deg,#fff2ea,#ffe7d8);border:1px solid #f6cba6}
  .vs .team .tt{font-weight:900;font-size:15px}.vs .team .sc{font-size:30px;font-weight:900;margin-top:2px}
  .vs .team .mm{font-size:12px;color:var(--muted)}
  .vs .mid{text-align:center;font-weight:900;color:var(--muted);font-size:20px}
  .vsbar{height:14px;border-radius:999px;overflow:hidden;display:flex;margin-top:14px;border:1px solid var(--line)}
  .vsbar .a{background:linear-gradient(90deg,#2299b3,#5ac6dc)}.vsbar .b{background:linear-gradient(90deg,#f6894f,#fc9f67)}
  .deptprize{margin-top:12px;background:linear-gradient(135deg,#fff6ed,#ffeede);border:1px solid #f6cba6;border-radius:12px;padding:12px 14px;font-size:13px;color:#7a4318;line-height:1.5}.deptprize b{color:#8a4a1e}

  /* approval queue */
  .appr{display:grid;gap:10px;margin-top:12px}
  .appr .row{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow2)}
  .appr .row .av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:900;color:#fff;font-size:13px;flex:none}
  .appr .row .info{flex:1}.appr .row .info b{font-weight:900}.appr .row .info .d{font-size:12.5px;color:var(--muted)}
  .appr .row .pts{font-weight:900;color:var(--good)}
  .appr .row .acts{display:flex;gap:8px}
  .appr .row button{border:none;width:38px;height:38px;border-radius:11px;font-size:17px;font-weight:900;cursor:pointer}
  .appr .row .ok{background:rgba(37,184,119,.15);color:var(--good)}.appr .row .no{background:rgba(232,96,122,.15);color:var(--red)}

  .prizes{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:15px}
  .prize{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;position:relative;overflow:hidden;box-shadow:var(--shadow2)}
  .prize.locked{opacity:.62}
  .prize .ic{height:130px;border-radius:14px;overflow:hidden;position:relative;background:linear-gradient(135deg,#f0f5fb,#e7eef8);display:grid;place-items:center;margin-bottom:11px}
  .prize.halo .ic{background:linear-gradient(135deg,#fff2e2,#ffe9d0)}
  .prize .ic img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .prize .ic .fb svg{height:70px;width:auto}
  .prize .nm{font-weight:800;min-height:40px;font-size:15.5px}
  .prize .pts{font-size:22px;font-weight:900;color:var(--orange);margin-top:2px}
  .prize .eta{font-size:12px;color:var(--muted);margin-top:6px}
  .prize .band{position:absolute;top:12px;left:-30px;transform:rotate(-45deg);background:var(--teal);color:#fff;font-weight:900;font-size:10px;padding:3px 34px;box-shadow:var(--shadow2);z-index:3}
  .prize .band.halo{background:linear-gradient(90deg,var(--orange),var(--gold))}
  .prize .lockchip{position:absolute;top:10px;right:10px;z-index:3;background:rgba(20,27,46,.82);color:#fff;font-size:10.5px;font-weight:900;padding:4px 9px;border-radius:999px}
  .prize .redeem{margin-top:11px;width:100%;border:none;border-radius:11px;padding:10px;font-family:inherit;font-weight:900;cursor:pointer;font-size:13px}
  .prize .redeem.can{background:var(--good);color:#fff}.prize .redeem.cant{background:#eef1f7;color:var(--muted);cursor:not-allowed}

  .field{margin-top:12px}.field label{display:block;font-weight:800;font-size:13px;margin-bottom:6px}
  select,input{width:100%;background:#f8fafd;border:1px solid var(--line);border-radius:12px;color:var(--ink);font-family:inherit;font-size:15px;padding:12px 13px}
  select:focus,input:focus{outline:none;border-color:var(--teal)}
  .btn{background:linear-gradient(90deg,var(--orange),var(--orange2));border:none;color:#fff;font-family:inherit;font-weight:900;font-size:15px;padding:13px 20px;border-radius:13px;cursor:pointer;width:100%;margin-top:16px;box-shadow:0 6px 18px rgba(246,137,79,.3)}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}.ptsPreview{font-weight:900;color:var(--good)}
  .feed{display:grid;gap:9px;margin-top:6px}
  .feed .row{display:flex;align-items:center;gap:10px;background:#f8fafd;border:1px solid var(--line);border-radius:12px;padding:10px 13px;font-size:13.5px}
  .feed .row .dot{width:9px;height:9px;border-radius:50%;flex:none}.feed .row .pts{margin-inline-start:auto;font-weight:900;color:var(--good)}
  .feed .row .badge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:999px;background:rgba(217,165,49,.14);color:var(--gold)}
  .reftree{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  .refnode{background:#f0f9f4;border:1px solid #bfe6ce;border-radius:12px;padding:9px 13px;font-size:13px;color:#1e6b45}.refnode b{color:var(--good)}
  .pill{font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;background:#f0f3f9;color:var(--muted);border:1px solid var(--line)}

  .tiershow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:16px}
  @media(max-width:900px){.tiershow{grid-template-columns:repeat(2,1fr)}}@media(max-width:520px){.tiershow{grid-template-columns:1fr}}
  .tcard{border-radius:18px;padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:280px;display:flex;flex-direction:column}
  .tcard .med{margin:0 auto 8px}.tcard .med svg{width:56px;height:56px}
  .tcard .tn{font-weight:900;font-size:20px;text-align:center}
  .tcard .te{font-weight:800;font-size:11px;letter-spacing:.14em;text-align:center;opacity:.7;margin-bottom:6px}
  .tcard .thr{text-align:center;font-weight:800;font-size:12.5px;opacity:.9;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid rgba(0,0,0,.14)}
  .tcard.metal-black .thr{border-color:rgba(233,196,99,.3)}
  .tcard ul{list-style:none;margin:0;padding:0;font-size:12.5px;font-weight:600;line-height:1.65}
  .tcard li{display:flex;gap:6px;margin-bottom:3px}.tcard li::before{content:"✦";opacity:.7}
  .tcard .mult{margin-top:auto;padding-top:10px;font-weight:900;font-size:15px;text-align:center}

let toastT;
function celebrate(msg){const t=$("#toast");t.innerHTML="🎉 "+msg;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),3000);confetti();}
function confetti(){const c=$("#confetti"),ctx=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;
  const cols=["#f6894f","#2299b3","#25b877","#d9a531","#9a6ff0"];
  let ps=Array.from({length:120},()=>({x:innerWidth/2+(Math.random()-.5)*220,y:innerHeight/2,vx:(Math.random()-.5)*10,vy:Math.random()*-12-4,g:.4,r:Math.random()*6+3,c:cols[Math.floor(Math.random()*cols.length)],a:1}));
  let f=0;(function anim(){ctx.clearRect(0,0,c.width,c.height);f++;ps.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.a-=.013;ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.r,p.r)});if(f<85)requestAnimationFrame(anim);else ctx.clearRect(0,0,c.width,c.height)})();}
</script>
